<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warpbox</title>
<link rel="icon" href="/favicon.ico" type="image/png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 640px;
  }
  img {
    width: 240px;
    height: auto;
    margin-bottom: 1.5rem;
    border-radius: 12px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #38bdf8;
  }
  p {
    font-size: 1rem;
    line-height: 1.6;
    color: #94a3b8;
    margin-bottom: 1.5rem;
  }
  .badge {
    display: inline-block;
    background: #1e293b;
    color: #38bdf8;
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .badge + .badge { margin-left: 0.5rem; }
  a { color: #38bdf8; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <img src="/warpbox.png" alt="Warpbox logo">
  <h1>Warpbox</h1>
  <p>
    A high-performance WebDAV proxy for TorBox — decouples filesystem
    speed from network speed to protect strict API rate limits.
  </p>
  <p>
    <span class="badge">WebDAV</span>
    <span class="badge">CGO / SQLite</span>
  </p>
  <p style="margin-top:2rem">
    <a href="https://REDACTED/ben/warpbox" target="_blank">Source</a>
    &nbsp;·&nbsp;
    <a href="/webdav/">WebDAV root</a>
  </p>
</div>
</body>
</html>
