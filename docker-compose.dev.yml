# Warpbox — Local development build
#
# Builds the Go binary from source inside the container. Requires the
# full Go toolchain. For production deployments, use docker-compose.yml
# which pulls a pre-built image from the registry.
#
# Quick start:
#   1. Copy config.yml.example to ./data/config.yml and fill in your TorBox API key.
#   2. docker compose -f docker-compose.dev.yml up -d
#   3. Point rclone to http://localhost:1412/webdav/

services:
  warpbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: warpbox-linux-amd64
    container_name: warpbox-dev
    ports:
      - "1412:1412"
    volumes:
      - ./data:/data
    restart: unless-stopped