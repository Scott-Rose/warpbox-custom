# Warpbox — Example Docker Compose for production deployments
#
# Copy this file to the target machine and adjust as needed.
# The image tag should match the release version you want to run.
#
# Quick start:
#   1. docker login REDACTED -u <username>
#   2. Create ./data/config.yml with your TorBox API key:
#        torbox:
#          api_key: "your-key-here"
#   3. docker compose up -d
#   4. Verify: docker compose logs -f
#   5. Test:   curl http://localhost:1412/webdav/

services:
  warpbox:
    # Pick the tag that matches your release (e.g. 0.6.0, 0.7.0).
    # Available tags: https://REDACTED/ben/-/packages/container/warpbox
    image: REDACTED/ben/warpbox:0.6.0-test-amd64
    container_name: warpbox
    ports:
      - "1412:1412"
    volumes:
      - ./data:/data
    restart: unless-stopped